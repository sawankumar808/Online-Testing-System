{% extends 'main.html' %}

{% block title %} OTS - Login form {%endblock title %}
{% block top %} 
<a href="{% url 'OTS:registrationForm' %}"> Signup </a>
<a href="{% url 'OTS:login' %}">Login</a>


{%endblock %}
{% block content%}
<div class="all-forms">
    {% if loginError %}
         <div id="error"> {{loginError}}</div>
    {% endif %}     
    <form action="{% url 'OTS:login' %}"method="POST">
        {%csrf_token %}
        <div class="form-unti">
            <label for="username">Username</label>
            <input type="text" name="username">
        </div>
        <div class="form-unti">
            <label for="password">password</label>
            <input type="password" name="password">
        </div>
        <div class="form-unit">
            <input type="submit" value="Login">
            <input type="reset" value="clear">
        </div>
        
    </form>
    New user <a href="{% url 'OTS:registrationForm' %}">Click here</a>
</div>
{% endblock %}
